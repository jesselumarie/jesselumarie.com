<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>jesse@boulder:~</title>
  <meta name="description" content="Jesse Lumarie — software developer and former lawyer. Type 'help' to get started.">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;600&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #0b0f0d;
      --fg: #c9e8cf;
      --green: #4ade80;
      --dim: #5d7263;
      --amber: #fbbf24;
      --cyan: #67e8f9;
    }

    * { box-sizing: border-box; }

    html, body {
      margin: 0;
      background: var(--bg);
      color: var(--fg);
      font-family: 'IBM Plex Mono', ui-monospace, Menlo, monospace;
      font-size: 15px;
      line-height: 1.65;
    }

    body::after {
      content: "";
      position: fixed;
      inset: 0;
      pointer-events: none;
      background:
        radial-gradient(ellipse at center, transparent 60%, rgba(0,0,0,.35) 100%),
        repeating-linear-gradient(to bottom, rgba(255,255,255,.02) 0 1px, transparent 1px 3px);
    }

    .term {
      max-width: 760px;
      margin: 0 auto;
      padding: 28px 20px 120px;
      min-height: 100svh;
    }

    .titlebar {
      color: var(--dim);
      font-size: 12px;
      margin-bottom: 20px;
      display: flex;
      justify-content: space-between;
      gap: 12px;
    }

    .line { white-space: pre-wrap; word-break: break-word; }

    .prompt { color: var(--green); font-weight: 600; }
    .cmd { color: var(--fg); }
    .out { color: var(--fg); }
    .dim { color: var(--dim); }
    .amber { color: var(--amber); }
    .cyan { color: var(--cyan); }

    a { color: var(--cyan); text-decoration: none; }
    a:hover, a:focus-visible { background: var(--cyan); color: var(--bg); outline: none; }

    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(140px, 1fr));
      gap: 2px 24px;
      margin: 4px 0 8px;
    }

    .inputline { display: flex; align-items: baseline; gap: 0; }

    #stdin {
      flex: 1;
      background: transparent;
      border: none;
      color: var(--fg);
      font: inherit;
      caret-color: var(--green);
      padding: 0 0 0 8px;
      outline: none;
    }

    .cursor {
      display: inline-block;
      width: 9px;
      height: 1.1em;
      background: var(--green);
      vertical-align: text-bottom;
      animation: blink 1.1s steps(1) infinite;
    }

    @keyframes blink { 50% { opacity: 0; } }
    @media (prefers-reduced-motion: reduce) { .cursor { animation: none; } }

    .sr-only {
      position: absolute; width: 1px; height: 1px;
      overflow: hidden; clip: rect(0 0 0 0);
    }
  </style>
</head>
<body>
  <div class="term" id="term">
    <div class="titlebar">
      <span>jesse@boulder — zsh</span>
      <span id="uptime">up 0s</span>
    </div>
    <div id="scrollback"></div>
    <form class="inputline" id="promptform" autocomplete="off">
      <label class="sr-only" for="stdin">Type a command</label>
      <span class="prompt">jesse@boulder:~$</span>
      <input id="stdin" type="text" autocapitalize="none" autocorrect="off" spellcheck="false" enterkeyhint="go">
    </form>
  </div>

  <script>
    (function () {
      var scrollback = document.getElementById('scrollback');
      var input = document.getElementById('stdin');
      var start = Date.now();

      setInterval(function () {
        var s = Math.floor((Date.now() - start) / 1000);
        document.getElementById('uptime').textContent =
          'up ' + (s >= 60 ? Math.floor(s / 60) + 'm ' : '') + (s % 60) + 's';
      }, 1000);

      var LINKS = {
        about:     ['About',     'https://jesselumarie.com/about'],
        writing:   ['Writing',   'https://jesselumarie.com/blog'],
        github:    ['GitHub',    'https://github.com/jesselumarie'],
        linkedin:  ['LinkedIn',  'https://www.linkedin.com/in/jesselumarie'],
        twitter:   ['Twitter',   'https://twitter.com/jesselumarie'],
        instagram: ['Instagram', 'https://instagram.com/jesselumarie'],
        email:     ['Email',     'mailto:jesse.lumarie@gmail.com']
      };

      function el(html) {
        var d = document.createElement('div');
        d.className = 'line';
        d.innerHTML = html;
        scrollback.appendChild(d);
      }

      function echoCmd(cmd) {
        el('<span class="prompt">jesse@boulder:~$</span> <span class="cmd"></span>');
        scrollback.lastChild.querySelector('.cmd').textContent = cmd;
      }

      function linkList() {
        var keys = Object.keys(LINKS);
        var html = '<div class="grid">';
        keys.forEach(function (k) {
          html += '<span><a href="' + LINKS[k][1] + '">' + k + '/</a></span>';
        });
        html += '</div>';
        return html;
      }

      var COMMANDS = {
        help: function () {
          el('<span class="dim">Available commands:</span>');
          el('  <span class="amber">whoami</span>     who is this guy');
          el('  <span class="amber">ls</span>         list links');
          el('  <span class="amber">open</span> <span class="dim">&lt;name&gt;</span>  open a link (e.g. <span class="dim">open writing</span>)');
          el('  <span class="amber">contact</span>    send me an email');
          el('  <span class="amber">history</span>    employment history');
          el('  <span class="amber">clear</span>      clear the screen');
        },
        whoami: function () {
          el('Jesse Lumarie — software developer and (former) lawyer');
          el('<span class="dim">Location:</span> Boulder, Colorado');
          el('<span class="dim">Interests:</span> programming, machine learning, writing');
        },
        ls: function () { el(linkList()); },
        history: function () {
          el('  1  <span class="dim">practice law</span>');
          el('  2  <span class="dim">learn to code</span>');
          el('  3  <span class="amber">build software</span>  <span class="dim"># you are here</span>');
        },
        contact: function () {
          el('Opening mail client… or just write to <a href="mailto:jesse.lumarie@gmail.com">jesse.lumarie@gmail.com</a>');
          setTimeout(function () { window.location.href = 'mailto:jesse.lumarie@gmail.com'; }, 600);
        },
        clear: function () { scrollback.innerHTML = ''; },
        pwd: function () { el('/home/jesse'); },
        sudo: function () { el('<span class="amber">jesse is not in the sudoers file. This incident will be reported.</span>'); }
      };

      function run(raw) {
        var argv = raw.trim().split(/\s+/);
        var cmd = (argv[0] || '').toLowerCase();
        if (!cmd) return;
        echoCmd(raw);
        if (cmd === 'open' && argv[1]) {
          var key = argv[1].toLowerCase().replace(/\/$/, '');
          if (LINKS[key]) {
            el('<span class="dim">opening ' + key + '…</span>');
            window.open(LINKS[key][1], '_blank');
          } else {
            el('open: no such link: ' + argv[1] + ' <span class="dim">(try: ls)</span>');
          }
        } else if (COMMANDS[cmd]) {
          COMMANDS[cmd]();
        } else {
          el('zsh: command not found: ' + cmd + ' <span class="dim">(try: help)</span>');
        }
        window.scrollTo(0, document.body.scrollHeight);
      }

      // Boot sequence, typed out.
      var boot = ['whoami', 'ls'];
      var bootNotes = {
        whoami: null,
        ls: null
      };

      function typeCommand(cmd, done) {
        var line = document.createElement('div');
        line.className = 'line';
        line.innerHTML = '<span class="prompt">jesse@boulder:~$</span> <span class="cmd"></span><span class="cursor"></span>';
        scrollback.appendChild(line);
        var target = line.querySelector('.cmd');
        var i = 0;
        var reduced = window.matchMedia('(prefers-reduced-motion: reduce)').matches;
        var speed = reduced ? 0 : 65;

        function step() {
          if (i <= cmd.length) {
            target.textContent = cmd.slice(0, i);
            i++;
            setTimeout(step, speed);
          } else {
            line.querySelector('.cursor').remove();
            COMMANDS[cmd]();
            done && setTimeout(done, reduced ? 0 : 350);
          }
        }
        setTimeout(step, speed);
      }

      input.form.addEventListener('submit', function (e) {
        e.preventDefault();
        run(input.value);
        input.value = '';
      });

      // Keep taps focusing the prompt, but don't steal link taps.
      document.addEventListener('click', function (e) {
        if (!e.target.closest('a') && !e.target.closest('input')) input.focus();
      });

      el('<span class="dim">Last login: from a website that had not been updated in forever</span>');
      typeCommand('whoami', function () {
        typeCommand('ls', function () {
          el('<span class="dim">Type <span class="amber">help</span> for commands.</span>');
          if (matchMedia('(hover: hover)').matches) input.focus();
        });
      });
    })();
  </script>
</body>
</html>
