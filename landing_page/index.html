<!doctype html>
<html>
  <head>
    <!-- critical canvas color: paints before external CSS loads, prevents white flash -->
    <style>
      html { background-color: white; color-scheme: light dark; }
      @media (prefers-color-scheme: dark) { html { background-color: rgb(17, 17, 17); } }
    </style>

    <!-- Global site tag (gtag.js) - Google Analytics -->
    <script async src="https://www.googletagmanager.com/gtag/js?id=UA-169224616-2"></script>
    <script>
      window.dataLayer = window.dataLayer || [];
      function gtag(){dataLayer.push(arguments);}
      gtag('js', new Date());

      gtag('config', 'UA-169224616-2');
    </script>

    <!-- connect to CDNs early so render-blocking CSS resolves faster -->
    <link rel="preconnect" href="https://maxcdn.bootstrapcdn.com">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

    <!-- Latest compiled and minified JavaScript (deferred: don't block first paint) -->
    <script defer src="https://ajax.googleapis.com/ajax/libs/jquery/2.1.3/jquery.min.js"></script>
    <script defer src="https://maxcdn.bootstrapcdn.com/bootstrap/3.3.2/js/bootstrap.min.js"></script>
    <!-- Latest compiled and minified CSS -->
    <link rel="stylesheet" href="https://maxcdn.bootstrapcdn.com/bootstrap/3.3.2/css/bootstrap.min.css">

    <!-- Optional theme -->

    <link href='https://fonts.googleapis.com/css?family=Open+Sans' rel='stylesheet' type='text/css'>

    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta charset="utf-8"/>

    <link rel="shortcut icon" href="jl_icon.png"/>

    <link href='style.css' rel='stylesheet' type='text/css'>

    <!-- a moogle walks across the bottom of the page; click it for /ffvii -->
    <script defer src="moogle.js"></script>

    <!-- pixel Jesse strolls by too; click him for lumarie.family -->
    <script defer src="jesse.js?v=12"></script>

    <!-- prerender same-site links on hover so navigation is instant (Chromium); prefetch as fallback -->
    <script type="speculationrules">
      { "prerender": [{ "where": { "href_matches": "/*" }, "eagerness": "moderate" }] }
    </script>
    <link rel="prefetch" href="/about">
    <link rel="prefetch" href="/blog">

    <title>Jesse Lumarie</title>
  </head>
