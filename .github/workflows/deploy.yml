name: Deploy

on:
  push:
    branches: [master]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install pelican markdown

      - name: Build blog
        run: make html
        working-directory: blog

      - name: Assemble site
        run: |
          mkdir -p s3_assets_to_deploy/blog
          cp -r landing_page/. s3_assets_to_deploy/
          cp -r blog/output/. s3_assets_to_deploy/blog/

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: us-east-1

      # cp (not sync) so every object gets cache headers, even unchanged ones
      - name: Upload to S3 with cache headers
        run: |
          # images & fonts: browsers/edge keep for a week
          aws s3 cp s3_assets_to_deploy/ s3://jesselumarie.com --recursive \
            --exclude "*" \
            --include "*.png" --include "*.jpg" --include "*.jpeg" --include "*.gif" \
            --include "*.svg" --include "*.ico" \
            --include "*.woff" --include "*.woff2" --include "*.ttf" \
            --cache-control "public, max-age=604800"
          # css & js: not fingerprinted and change in place, so one hour
          aws s3 cp s3_assets_to_deploy/ s3://jesselumarie.com --recursive \
            --exclude "*" --include "*.css" --include "*.js" \
            --cache-control "public, max-age=3600"
          # html & the rest: browsers revalidate; edge may cache until invalidated
          aws s3 cp s3_assets_to_deploy/ s3://jesselumarie.com --recursive \
            --exclude "*.png" --exclude "*.jpg" --exclude "*.jpeg" --exclude "*.gif" \
            --exclude "*.svg" --exclude "*.ico" \
            --exclude "*.woff" --exclude "*.woff2" --exclude "*.ttf" \
            --exclude "*.css" --exclude "*.js" \
            --cache-control "no-cache, s-maxage=86400"
          # uploads are done above; sync only removes files deleted from the repo
          aws s3 sync s3_assets_to_deploy/ s3://jesselumarie.com --delete

      - name: Invalidate CloudFront
        run: aws cloudfront create-invalidation --distribution-id "${{ secrets.AWS_CLOUDFRONT_ID }}" --paths '/*'
