<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Jesse Lumarie — Menu</title>
  <meta name="description" content="The website of Jesse Lumarie, presented as a Final Fantasy VII menu.">
  <link rel="shortcut icon" href="../jl_icon.png">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Roboto+Condensed:wght@400;500;700&display=swap" rel="stylesheet">
  <link href="ff7.css" rel="stylesheet">
</head>
<body>
  <div class="tv">
    <div class="screen">
      <div class="frame">

    <div class="hintbar window" role="status"><span id="hint">Welcome to jesselumarie<span class="dot">.</span>com</span></div>

    <div id="app"></div>
  </div>

      <div id="crt" aria-hidden="true"></div>
    </div>

    <div class="chin" aria-hidden="true">
      <div class="vents"><i></i><i></i><i></i><i></i><i></i><i></i></div>
      <div class="brand">LUMARIE</div>
      <div class="tv-controls">
        <span class="model">PVM&#8211;1997</span>
        <span class="knob"></span>
        <span class="knob"></span>
        <button class="power" id="powerBtn" type="button" title="Power"></button>
        <span class="led" id="powerLed"></span>
      </div>
    </div>
  </div>

  <div class="overlay" id="configOverlay" role="dialog" aria-modal="true" aria-label="Config">
    <div class="config window">
      <h2>Config</h2>
      <ul id="configList"></ul>
    </div>
  </div>

  <div class="overlay" id="colorOverlay" role="dialog" aria-modal="true" aria-label="Color Setting">
    <div class="config colorcfg window">
      <h2>Color Setting</h2>
      <div class="cpreview window" id="colorPreview" aria-hidden="true"></div>
      <ul id="colorList"></ul>
    </div>
  </div>

  <script src="ff7.js"></script>
  <script src="manifest.js"></script>
  <script src="screens.js"></script>
</body>
</html>
