<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Jesse Lumarie — Menu</title>
  <meta name="description" content="The website of Jesse Lumarie, presented as a Final Fantasy VII menu.">
  <link rel="shortcut icon" href="../jl_icon.png">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Roboto+Condensed:wght@400;500;700&display=swap" rel="stylesheet">
  <style>
    /* Reactor7 by Caveras (caveras.net) — FFVII PSX menu font recreation, free for personal use */
    @font-face {
      font-family: 'Reactor7';
      src: url('Reactor7.woff2') format('woff2'), url('Reactor7.ttf') format('truetype');
      font-weight: normal;
      font-style: normal;
      font-display: swap;
    }
    :root {
      --win-top: #2028b0;
      --win-bottom: #050840;
      --border-light: #e9e9e9;
      --border-mid: #8f8f8f;
      --border-dark: #3c3c3c;
      --label: #9fe8e4;
      --gold: #ffe08a;
      --bar-track: #262640;
      --bar-fill-a: #d0a2c4;
      --bar-fill-b: #8f5f85;
      --time-val: #8fd8f8;
      --hint-top: #a35cc9;
      --hint-bottom: #55287f;
    }

    * { box-sizing: border-box; }

    html, body {
      margin: 0;
      padding: 0;
      background: #000;
      color: #fff;
      font-family: 'Reactor7', 'Roboto Condensed', 'Arial Narrow', Arial, sans-serif;
      font-weight: normal;
      letter-spacing: 0;
    }

    body {
      min-height: 100svh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 12px;
      gap: 10px;
      background:
        radial-gradient(ellipse at 50% -20%, rgba(38, 48, 160, .30), transparent 60%),
        #000;
    }

    /* ---- CRT shader stack: scanlines + phosphor triads + roll + vignette ---- */
    #crt {
      position: fixed;
      inset: 0;
      pointer-events: none;
      z-index: 60;
      /* light-touch version for phones: readable first, vibes second */
      background: repeating-linear-gradient(
        to bottom,
        rgba(0, 0, 0, .10) 0px,
        rgba(0, 0, 0, .10) 1px,
        transparent 1px,
        transparent 3px
      );
      animation: crt-flicker .14s steps(2) infinite;
    }

    /* slow rolling retrace band */
    #crt::before {
      content: "";
      position: absolute;
      left: 0;
      right: 0;
      top: 0;
      height: 22%;
      background: linear-gradient(
        to bottom,
        transparent,
        rgba(255, 255, 255, .035) 45%,
        rgba(255, 255, 255, .05) 50%,
        rgba(255, 255, 255, .035) 55%,
        transparent
      );
      animation: crt-roll 9s linear infinite;
    }

    /* curved-glass vignette and glare */
    #crt::after {
      content: "";
      position: absolute;
      inset: 0;
      background:
        radial-gradient(120% 65% at 30% -5%, rgba(255, 255, 255, .03), transparent 60%),
        radial-gradient(115% 108% at 50% 50%, transparent 64%, rgba(0, 0, 0, .12) 85%, rgba(0, 0, 0, .38) 100%);
    }

    @keyframes crt-flicker { 50% { opacity: .92; } }
    @keyframes crt-roll {
      from { transform: translateY(-110%); }
      to { transform: translateY(560%); }
    }

    body.no-scanlines #crt { display: none; }
    body.no-scanlines .frame { filter: none; }

    @media (prefers-reduced-motion: reduce) {
      #crt { animation: none; }
      #crt::before { display: none; }
    }

    /* ---- 90s TV shell: inert on mobile, real on desktop ---- */
    .tv, .screen { display: contents; }
    .chin { display: none; }

    @media (min-width: 900px) {
      body { padding: 40px 16px 56px; }

      .tv {
        display: block;
        background:
          linear-gradient(180deg, #333336 0%, #232326 8%, #1b1b1e 55%, #242427 96%, #101012 100%);
        border-radius: 26px;
        padding: 30px 30px 0;
        box-shadow:
          inset 0 2px 1px rgba(255, 255, 255, .10),
          inset 0 -3px 8px rgba(0, 0, 0, .65),
          inset 3px 0 6px rgba(0, 0, 0, .25),
          inset -3px 0 6px rgba(0, 0, 0, .25),
          0 35px 90px rgba(0, 0, 0, .85);
      }

      .screen {
        display: block;
        position: relative;
        overflow: hidden;
        border-radius: 30px / 26px;
        background: #000;
        padding: 30px 26px;
        border: 2px solid #060607;
        box-shadow:
          0 0 0 3px #0c0c0e,
          0 0 0 4px rgba(255, 255, 255, .05),
          inset 0 0 60px rgba(0, 0, 0, .95),
          inset 0 0 6px #000;
      }

      /* CRT clips to the glass; full-strength tube inside the TV */
      #crt {
        position: absolute;
        background:
          repeating-linear-gradient(
            to bottom,
            rgba(0, 0, 0, .22) 0px,
            rgba(0, 0, 0, .22) 1px,
            transparent 1px,
            transparent 3px
          ),
          repeating-linear-gradient(
            to right,
            rgba(255, 0, 80, .055) 0px, rgba(255, 0, 80, .055) 1px,
            rgba(0, 255, 120, .045) 1px, rgba(0, 255, 120, .045) 2px,
            rgba(40, 90, 255, .055) 2px, rgba(40, 90, 255, .055) 3px
          );
      }

      #crt::after {
        background:
          radial-gradient(120% 65% at 30% -5%, rgba(255, 255, 255, .045), transparent 60%),
          radial-gradient(115% 108% at 50% 50%, transparent 58%, rgba(0, 0, 0, .22) 82%, rgba(0, 0, 0, .62) 100%);
      }

      /* phosphor bleed on the picture, desktop only */
      .frame { filter: blur(.3px) saturate(1.07) contrast(1.03); }
      body.no-scanlines .frame { filter: none; }

      /* ---- chin: badge, vents, knobs, power ---- */
      .chin {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 20px;
        padding: 16px 22px 18px;
      }

      .vents { display: flex; gap: 5px; }
      .vents i {
        width: 3px;
        height: 16px;
        border-radius: 2px;
        background: #0b0b0d;
        box-shadow: inset 0 1px 1px rgba(0, 0, 0, .9), 0 1px 0 rgba(255, 255, 255, .05);
      }

      .brand {
        font-family: Helvetica, Arial, sans-serif;
        font-size: 15px;
        font-weight: bold;
        letter-spacing: .42em;
        text-indent: .42em;
        background: linear-gradient(180deg, #e3e3e8, #8f8f97 55%, #c9c9cf);
        -webkit-background-clip: text;
        background-clip: text;
        color: transparent;
        text-shadow: 0 1px 1px rgba(0, 0, 0, .7);
      }

      .tv-controls { display: flex; align-items: center; gap: 12px; }

      .model {
        font-family: Helvetica, Arial, sans-serif;
        font-size: 10px;
        letter-spacing: .12em;
        color: #77777e;
        margin-right: 6px;
      }

      .knob {
        width: 14px;
        height: 14px;
        border-radius: 50%;
        background: radial-gradient(circle at 35% 30%, #3a3a3e, #141416 70%);
        box-shadow: inset 0 1px 1px rgba(255, 255, 255, .12), 0 1px 2px rgba(0, 0, 0, .8);
      }

      .power {
        width: 26px;
        height: 26px;
        border-radius: 50%;
        border: none;
        cursor: pointer;
        background: radial-gradient(circle at 35% 30%, #3f3f44, #17171a 65%);
        box-shadow:
          inset 0 1px 1px rgba(255, 255, 255, .14),
          inset 0 -2px 3px rgba(0, 0, 0, .7),
          0 1px 2px rgba(0, 0, 0, .8);
        outline-offset: 3px;
      }

      .power:active { transform: translateY(1px); }

      .led {
        width: 7px;
        height: 7px;
        border-radius: 50%;
        background: #46ff6e;
        box-shadow: 0 0 6px 1px rgba(70, 255, 110, .8);
      }

      body.tv-off .led {
        background: #5a1410;
        box-shadow: none;
      }

      /* power-off: picture collapses to a line, then black */
      .screen::after {
        content: "";
        position: absolute;
        inset: 0;
        background: #000;
        opacity: 0;
        pointer-events: none;
        transition: opacity .18s ease .12s;
        z-index: 70;
      }

      body.tv-off .screen::after { opacity: 1; pointer-events: auto; }

      body.tv-off .frame {
        animation: tv-collapse .18s ease-in forwards;
      }

      body:not(.tv-off) .frame.tv-on-anim {
        animation: tv-expand .22s ease-out;
      }

      @keyframes tv-collapse {
        to { transform: scaleY(.004) scaleX(1.15); filter: brightness(6) blur(.3px); }
      }

      @keyframes tv-expand {
        from { transform: scaleY(.004) scaleX(1.15); filter: brightness(6) blur(.3px); }
        to { transform: none; }
      }

      @media (prefers-reduced-motion: reduce) {
        body.tv-off .frame, body:not(.tv-off) .frame.tv-on-anim { animation: none; }
        body.tv-off .frame { visibility: hidden; }
      }
    }

    .window {
      background: linear-gradient(170deg, var(--win-top) 0%, var(--win-bottom) 90%);
      border: 3px solid var(--border-light);
      border-radius: 7px;
      box-shadow:
        inset 0 0 0 2px var(--border-mid),
        inset 0 0 0 4px var(--border-dark),
        0 6px 18px rgba(0, 0, 0, .7);
      text-shadow: 2px 2px 0 rgba(0, 0, 0, .85);
    }

    .frame {
      width: 100%;
      max-width: 900px;
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    /* ---- Hint bar (top-left, purple like the in-game tutorial window) ---- */
    .hintbar {
      align-self: flex-start;
      background: linear-gradient(180deg, var(--hint-top), var(--hint-bottom));
      padding: 9px 20px;
      font-size: 18px;
      max-width: 100%;
      min-height: 44px;
      display: flex;
      align-items: center;
    }

    /* ---- Main layout: party left, menu column right ---- */
    .layout {
      display: grid;
      grid-template-columns: 1fr 245px;
      grid-template-areas:
        "party menu"
        "loc   timegil";
      gap: 10px;
      align-items: stretch;
    }

    /* ---- Party window (full height even with a solo party, like the game) ---- */
    .party {
      grid-area: party;
      min-height: 480px;
      padding: 24px 26px;
      display: flex;
      flex-direction: column;
      justify-content: flex-start;
    }

    .member {
      display: flex;
      gap: 24px;
      align-items: center;
    }

    .portrait {
      width: 122px;
      height: 122px;
      flex: none;
      border: 1px solid #000;
      box-shadow: 3px 3px 0 rgba(0,0,0,.6);
      object-fit: cover;
      image-rendering: pixelated;
      filter: contrast(1.08) saturate(1.12);
    }

    .stats { flex: 1 1 200px; min-width: 0; }

    .mname { font-size: 26px; letter-spacing: .02em; margin: 0 0 8px; }

    .srow {
      display: grid;
      grid-template-columns: 2.4em 1fr;
      align-items: baseline;
      font-size: 18px;
      line-height: 1.5;
    }

    .srow .lab { color: var(--label); }
    .srow .val {
      text-align: right;
      max-width: 10em;
      font-variant-numeric: tabular-nums;
    }

    /* fixed-width number cells so the slashes line up like the game */
    .pnum { display: inline-block; min-width: 4.1ch; text-align: right; }

    .thinbar {
      grid-column: 2;
      max-width: 10em;
      height: 4px;
      margin-top: 1px;
      background: var(--bar-track);
      border-top: 1px solid rgba(0,0,0,.8);
      border-bottom: 1px solid rgba(255,255,255,.22);
    }

    .thinbar > span {
      display: block;
      height: 100%;
      background: linear-gradient(to bottom, var(--bar-fill-a), var(--bar-fill-b));
    }

    /* right block: next level / limit */
    .growth {
      flex: 1 1 190px;
      min-width: 160px;
      font-size: 17px;
      align-self: center;
    }

    .growth .glabel { display: flex; justify-content: space-between; gap: 8px; }
    .growth .gsub { color: var(--gold); font-size: 14px; }

    .fatbar {
      height: 10px;
      margin: 4px 0 12px;
      background: var(--bar-track);
      border: 1px solid #000;
      box-shadow: 0 1px 0 rgba(255,255,255,.25);
      overflow: hidden;
    }

    .fatbar > span {
      display: block;
      height: 100%;
      background: linear-gradient(to bottom, var(--bar-fill-a), var(--bar-fill-b));
    }

    /* limit full on the birthday: rainbow + flash, like the in-game gauge */
    .fatbar.rainbow > span {
      width: 100% !important;
      background: linear-gradient(90deg,
        #ff4040, #ffa040, #ffe040, #40e060, #40c8ff, #6070ff, #c060ff, #ff4040);
      background-size: 200% 100%;
      animation: rainbow-slide 1.2s linear infinite, limit-flash .5s steps(2) infinite;
    }

    @keyframes rainbow-slide { to { background-position: -200% 0; } }
    @keyframes limit-flash { 50% { filter: brightness(1.7); } }

    /* ---- Menu window ---- */
    .menu {
      grid-area: menu;
      padding: 20px 10px 20px 14px;
    }

    .menu ul { list-style: none; margin: 0; padding: 0; }
    .menu li { position: relative; }

    .menu a {
      display: block;
      color: #fff;
      text-decoration: none;
      font-size: 21px;
      letter-spacing: .03em;
      padding: 9px 6px 9px 44px;
      outline: none;
      cursor: pointer;
    }

    .menu a.disabled { color: #8a8a8a; }

    .hand {
      position: absolute;
      left: 4px;
      top: 50%;
      translate: 0 -50%;
      opacity: 0;
      font-size: 22px;
      pointer-events: none;
      filter: grayscale(1) brightness(1.65) drop-shadow(2px 2px 0 rgba(0,0,0,.8));
    }

    li.selected > a > .hand,
    li.selected > .citem > .hand { opacity: 1; }

    .menu .spacer { height: 20px; }

    /* ---- Time / Gil ---- */
    .timegil {
      grid-area: timegil;
      padding: 14px 18px;
      font-size: 19px;
      align-self: end;
    }

    .kv { display: flex; justify-content: space-between; align-items: baseline; gap: 10px; }
    .kv + .kv { margin-top: 8px; }
    .kv .v { font-variant-numeric: tabular-nums; }
    .kv .time-v { color: var(--time-val); }

    /* ---- Location ---- */
    .loc {
      grid-area: loc;
      padding: 12px 22px;
      font-size: 20px;
      align-self: end;
      justify-self: start;
      min-width: 45%;
    }

    /* ---- Config (debug) modal ---- */
    .overlay {
      position: fixed;
      inset: 0;
      background: rgba(0, 0, 0, .55);
      display: none;
      align-items: center;
      justify-content: center;
      padding: 16px;
      z-index: 50;
    }

    .overlay.open { display: flex; }

    .config {
      width: min(92vw, 430px);
      padding: 16px 14px;
    }

    .config h2 {
      margin: 0 0 10px;
      font-size: 19px;
      color: var(--gold);
      letter-spacing: .02em;
    }

    .config ul { list-style: none; margin: 0; padding: 0; }
    .config li { position: relative; }

    .config .citem {
      width: 100%;
      display: flex;
      justify-content: space-between;
      gap: 12px;
      background: none;
      border: none;
      color: #fff;
      font: inherit;
      font-size: 18px;
      letter-spacing: .03em;
      text-shadow: inherit;
      padding: 9px 6px 9px 40px;
      cursor: pointer;
      outline: none;
      text-align: left;
    }

    .config .cval { color: var(--label); }

    @media (max-width: 720px) {
      body { justify-content: flex-start; }

      .layout {
        grid-template-columns: 1fr 1fr;
        grid-template-areas:
          "party party"
          "menu  menu"
          "loc   timegil";
      }

      .party { padding: 18px 16px; min-height: 0; }
      .member { gap: 14px; flex-wrap: wrap; }
      .portrait { width: 96px; height: 96px; }
      .mname { font-size: 22px; }
      .srow { font-size: 16px; }
      .stats { flex: 1 1 160px; }
      .growth { flex: 1 1 100%; min-width: 0; font-size: 16px; }

      .menu ul {
        display: grid;
        grid-template-columns: 1fr 1fr;
        column-gap: 4px;
      }
      .menu .spacer { display: none; }
      .menu a { padding: 11px 4px 11px 36px; font-size: 18px; }

      .loc { min-width: 0; justify-self: stretch; }
    }
  </style>
</head>
<body>
  <div class="tv">
    <div class="screen">
      <div class="frame">

    <div class="hintbar window" role="status"><span id="hint">Welcome to jesselumarie.com.</span></div>

    <div class="layout">

      <section class="party window" aria-label="Party" id="party"></section>

      <nav class="menu window" aria-label="Main menu">
        <ul id="menu">
          <li><a href="https://jesselumarie.com/about" data-hint="Learn more about Jesse."><span class="hand">👉</span>About</a></li>
          <li><a href="https://jesselumarie.com/blog" data-hint="Read Jesse's writing."><span class="hand">👉</span>Writing</a></li>
          <li><a href="https://github.com/jesselumarie" data-hint="Inspect Jesse's materia."><span class="hand">👉</span>GitHub</a></li>
          <li><a href="https://www.linkedin.com/in/jesselumarie" data-hint="Employment record and battle history."><span class="hand">👉</span>LinkedIn</a></li>
          <li><a href="https://twitter.com/jesselumarie" data-hint="Short-form dispatches."><span class="hand">👉</span>Twitter</a></li>
          <li><a href="https://instagram.com/jesselumarie" data-hint="Field photography."><span class="hand">👉</span>Instagram</a></li>
          <li><a href="mailto:jesse.lumarie@gmail.com" data-hint="PHS — send Jesse a message."><span class="hand">👉</span>PHS</a></li>
          <li><a href="#" data-action="config" data-hint="Adjust windows, sound, and debug options."><span class="hand">👉</span>Config</a></li>
          <li class="spacer" role="presentation"></li>
          <li><a href="#" class="disabled" data-action="save" data-hint="You cannot save here."><span class="hand">👉</span>Save</a></li>
        </ul>
      </nav>

      <section class="loc window" aria-label="Location">Boulder, CO</section>

      <section class="timegil window" aria-label="Time and gil">
        <div class="kv"><span>Time</span> <span class="v time-v" id="time">0:00:00</span></div>
        <div class="kv"><span>Gil</span> <span class="v" id="gil">2244</span></div>
      </section>

    </div>
  </div>

      <div id="crt" aria-hidden="true"></div>
    </div>

    <div class="chin" aria-hidden="true">
      <div class="vents"><i></i><i></i><i></i><i></i><i></i><i></i></div>
      <div class="brand">LUMARIE</div>
      <div class="tv-controls">
        <span class="model">PVM&#8211;1997</span>
        <span class="knob"></span>
        <span class="knob"></span>
        <button class="power" id="powerBtn" type="button" title="Power"></button>
        <span class="led" id="powerLed"></span>
      </div>
    </div>
  </div>

  <div class="overlay" id="configOverlay" role="dialog" aria-modal="true" aria-label="Config">
    <div class="config window">
      <h2>Config</h2>
      <ul id="configList"></ul>
    </div>
  </div>

  <script>
    (function () {
      'use strict';

      /* ---------- save data ---------- */
      var KEY = 'ff7save';
      function loadSave() {
        try { return JSON.parse(localStorage.getItem(KEY)) || {}; } catch (e) { return {}; }
      }
      function writeSave() {
        try { localStorage.setItem(KEY, JSON.stringify(save)); } catch (e) { /* private mode */ }
      }
      var save = loadSave();
      if (typeof save.seconds !== 'number') save.seconds = 0;
      if (typeof save.gil !== 'number') save.gil = 2244;
      save.settings = save.settings || {};
      var settings = save.settings;
      if (typeof settings.sound !== 'boolean') settings.sound = true;
      if (typeof settings.scanlines !== 'boolean') settings.scanlines = true;
      if (typeof settings.birthday !== 'boolean') settings.birthday = false;
      if (!settings.windowColor) settings.windowColor = 'Blue';

      /* ---------- birthday math (June 22) ---------- */
      var BMONTH = 5, BDAY = 22, BYEAR = 1986;
      function now() { return new Date(); }
      function isBirthday() {
        var d = now();
        return settings.birthday || (d.getMonth() === BMONTH && d.getDate() === BDAY);
      }
      function age() {
        var d = now();
        var a = d.getFullYear() - BYEAR;
        if (d.getMonth() < BMONTH || (d.getMonth() === BMONTH && d.getDate() < BDAY)) a--;
        return a;
      }
      function daysToNextLevel() {
        var d = now();
        var next = new Date(d.getFullYear(), BMONTH, BDAY);
        if (next - d <= 0) next = new Date(d.getFullYear() + 1, BMONTH, BDAY);
        var today = new Date(d.getFullYear(), d.getMonth(), d.getDate());
        return Math.round((next - today) / 86400000);
      }

      /* ---------- party ---------- */
      var lv = age();
      var days = daysToNextLevel();
      var yearPct = Math.round((1 - days / 365) * 100);
      // Static, random, deliberately-not-full limit gauge (full only on the birthday).
      var limitPct = 25 + Math.floor(Math.random() * 56);

      var party = [
        {
          name: 'Jesse', img: 'jesse_ff7.png',
          lv: lv, hp: [9999, 9999], mp: [999, 999],
          limitLevel: Math.floor(lv / 10),
          hint: 'Jesse — software developer, former lawyer, LV ' + lv + '.'
        }
      ];

      function fmtPair(pair) {
        return '<span class="pnum">' + pair[0] + '</span>/<span class="pnum">' + pair[1] + '</span>';
      }

      function renderParty() {
        var html = '';
        party.forEach(function (m) {
          {
            var birthday = isBirthday();
            html +=
              '<div class="member" data-hint="' + m.hint + '">' +
                '<img class="portrait" src="' + m.img + '" alt="Portrait of ' + m.name + '">' +
                '<div class="stats">' +
                  '<p class="mname">' + m.name + '</p>' +
                  '<div class="srow"><span class="lab">LV</span><span class="val">' + m.lv + '</span></div>' +
                  '<div class="srow"><span class="lab">HP</span><span class="val">' + fmtPair(m.hp) + '</span><span class="thinbar"><span style="width:100%"></span></span></div>' +
                  '<div class="srow"><span class="lab">MP</span><span class="val">' + fmtPair(m.mp) + '</span><span class="thinbar"><span style="width:100%"></span></span></div>' +
                '</div>' +
                '<div class="growth">' +
                  '<div class="glabel"><span>next level</span><span class="gsub">' +
                    (birthday ? 'LEVEL UP!' : days + (days === 1 ? ' day' : ' days')) +
                  '</span></div>' +
                  '<div class="fatbar"><span style="width:' + (birthday ? 100 : yearPct) + '%"></span></div>' +
                  '<div class="glabel"><span>Limit level ' + m.limitLevel + '</span></div>' +
                  '<div class="fatbar' + (birthday ? ' rainbow' : '') + '"><span style="width:' + limitPct + '%"></span></div>' +
                '</div>' +
              '</div>';
          }
        });
        document.getElementById('party').innerHTML = html;
      }

      /* ---------- hint bar ---------- */
      var hintEl = document.getElementById('hint');
      var defaultHint = 'Welcome to jesselumarie.com.';
      function refreshDefaultHint() {
        if (isBirthday()) defaultHint = 'Happy birthday, Jesse! Limit break ready.';
        else defaultHint = 'Welcome to jesselumarie.com.';
        hintEl.textContent = defaultHint;
      }
      function setHint(t) { hintEl.textContent = t || defaultHint; }

      document.addEventListener('mouseover', function (e) {
        var t = e.target.closest('[data-hint]');
        setHint(t ? t.getAttribute('data-hint') : null);
      });

      /* ---------- sound ---------- */
      var audioCtx = null;
      function tone(freq, dur, vol) {
        if (!settings.sound) return;
        try {
          audioCtx = audioCtx || new (window.AudioContext || window.webkitAudioContext)();
          var o = audioCtx.createOscillator();
          var g = audioCtx.createGain();
          o.type = 'square';
          o.frequency.value = freq;
          g.gain.setValueAtTime(vol, audioCtx.currentTime);
          g.gain.exponentialRampToValueAtTime(0.0001, audioCtx.currentTime + dur);
          o.connect(g).connect(audioCtx.destination);
          o.start();
          o.stop(audioCtx.currentTime + dur + 0.01);
        } catch (e) { /* silence */ }
      }
      function blip() { tone(1320, 0.07, 0.03); }
      function confirmBeep() { tone(880, 0.09, 0.035); }
      function buzzer() { tone(160, 0.18, 0.05); }

      function getCtx() {
        if (!settings.sound) return null;
        try {
          audioCtx = audioCtx || new (window.AudioContext || window.webkitAudioContext)();
          return audioCtx;
        } catch (e) { return null; }
      }

      function noiseBurst(ctx, at, dur, vol, filterFreq) {
        var len = Math.max(1, Math.floor(ctx.sampleRate * dur));
        var buf = ctx.createBuffer(1, len, ctx.sampleRate);
        var data = buf.getChannelData(0);
        for (var i = 0; i < len; i++) data[i] = (Math.random() * 2 - 1) * (1 - i / len);
        var src = ctx.createBufferSource();
        src.buffer = buf;
        var f = ctx.createBiquadFilter();
        f.type = 'highpass';
        f.frequency.value = filterFreq || 2000;
        var g = ctx.createGain();
        g.gain.setValueAtTime(vol, at);
        src.connect(f).connect(g).connect(ctx.destination);
        src.start(at);
      }

      // CRT power-on: relay click, low degauss bloom, rising sweep, flyback whine
      function powerOnSound() {
        var ctx = getCtx();
        if (!ctx) return;
        var t = ctx.currentTime;

        noiseBurst(ctx, t, 0.025, 0.09, 2500);

        var bloom = ctx.createOscillator();
        var bg = ctx.createGain();
        bloom.type = 'sine';
        bloom.frequency.setValueAtTime(42, t);
        bloom.frequency.exponentialRampToValueAtTime(58, t + 0.35);
        bg.gain.setValueAtTime(0.0001, t);
        bg.gain.exponentialRampToValueAtTime(0.07, t + 0.08);
        bg.gain.exponentialRampToValueAtTime(0.0001, t + 0.55);
        bloom.connect(bg).connect(ctx.destination);
        bloom.start(t); bloom.stop(t + 0.6);

        var sweep = ctx.createOscillator();
        var sg = ctx.createGain();
        sweep.type = 'triangle';
        sweep.frequency.setValueAtTime(220, t + 0.04);
        sweep.frequency.exponentialRampToValueAtTime(1600, t + 0.22);
        sg.gain.setValueAtTime(0.0001, t + 0.04);
        sg.gain.exponentialRampToValueAtTime(0.035, t + 0.1);
        sg.gain.exponentialRampToValueAtTime(0.0001, t + 0.3);
        sweep.connect(sg).connect(ctx.destination);
        sweep.start(t + 0.04); sweep.stop(t + 0.32);

        var whine = ctx.createOscillator();
        var wg = ctx.createGain();
        whine.type = 'sine';
        whine.frequency.value = 15625;
        wg.gain.setValueAtTime(0.0001, t + 0.1);
        wg.gain.exponentialRampToValueAtTime(0.012, t + 0.4);
        wg.gain.setValueAtTime(0.012, t + 1.0);
        wg.gain.exponentialRampToValueAtTime(0.0001, t + 1.8);
        whine.connect(wg).connect(ctx.destination);
        whine.start(t + 0.1); whine.stop(t + 1.85);
      }

      // CRT power-off: falling sweep, deep thump, static discharge tick
      function powerOffSound() {
        var ctx = getCtx();
        if (!ctx) return;
        var t = ctx.currentTime;

        var sweep = ctx.createOscillator();
        var sg = ctx.createGain();
        sweep.type = 'sine';
        sweep.frequency.setValueAtTime(1800, t);
        sweep.frequency.exponentialRampToValueAtTime(55, t + 0.28);
        sg.gain.setValueAtTime(0.06, t);
        sg.gain.exponentialRampToValueAtTime(0.0001, t + 0.3);
        sweep.connect(sg).connect(ctx.destination);
        sweep.start(t); sweep.stop(t + 0.32);

        var thump = ctx.createOscillator();
        var tg = ctx.createGain();
        thump.type = 'sine';
        thump.frequency.setValueAtTime(70, t + 0.02);
        thump.frequency.exponentialRampToValueAtTime(32, t + 0.35);
        tg.gain.setValueAtTime(0.0001, t + 0.02);
        tg.gain.exponentialRampToValueAtTime(0.11, t + 0.06);
        tg.gain.exponentialRampToValueAtTime(0.0001, t + 0.5);
        thump.connect(tg).connect(ctx.destination);
        thump.start(t + 0.02); thump.stop(t + 0.55);

        noiseBurst(ctx, t + 0.16, 0.04, 0.05, 4000);
      }

      /* ---------- cursor-driven lists ---------- */
      function makeCursorList(items, onActivate) {
        var idx = 0;
        function apply(quiet) {
          items.forEach(function (li, i) { li.classList.toggle('selected', i === idx); });
          if (!quiet) blip();
        }
        apply(true);
        items.forEach(function (li, i) {
          li.addEventListener('mouseenter', function () {
            if (idx !== i) { idx = i; apply(); }
          });
        });
        return {
          move: function (delta) { idx = (idx + delta + items.length) % items.length; apply(); },
          activate: function () { onActivate(items[idx]); },
          current: function () { return items[idx]; }
        };
      }

      var menuItems = Array.prototype.slice.call(document.querySelectorAll('#menu li:not(.spacer)'));
      var menuCursor = makeCursorList(menuItems, function (li) { li.querySelector('a').click(); });

      document.querySelectorAll('#menu a').forEach(function (a) {
        a.addEventListener('click', function (e) {
          var action = a.getAttribute('data-action');
          if (action === 'config') { e.preventDefault(); openConfig(); return; }
          if (action === 'save') { e.preventDefault(); buzzer(); setHint('You cannot save here.'); return; }
          confirmBeep();
        });
      });

      /* ---------- config / debug menu ---------- */
      var overlay = document.getElementById('configOverlay');
      var configList = document.getElementById('configList');
      var WINDOW_COLORS = {
        Blue:     ['#2028b0', '#050840'],
        Green:    ['#0e7a34', '#032a10'],
        Crimson:  ['#a01030', '#2c030a'],
        Violet:   ['#7030c0', '#1a0640'],
        Midnight: ['#34344e', '#08080f']
      };

      function applySettings() {
        var c = WINDOW_COLORS[settings.windowColor] || WINDOW_COLORS.Blue;
        document.documentElement.style.setProperty('--win-top', c[0]);
        document.documentElement.style.setProperty('--win-bottom', c[1]);
        document.body.classList.toggle('no-scanlines', !settings.scanlines);
        refreshDefaultHint();
        renderParty();
        writeSave();
      }

      var configCursor = null;

      var configItems = [
        {
          label: 'Window color',
          hint: 'Cycle the window color, like the in-game Config screen.',
          value: function () { return settings.windowColor; },
          act: function () {
            var keys = Object.keys(WINDOW_COLORS);
            settings.windowColor = keys[(keys.indexOf(settings.windowColor) + 1) % keys.length];
          }
        },
        {
          label: 'Sound',
          hint: 'Toggle cursor sound effects.',
          value: function () { return settings.sound ? 'On' : 'Off'; },
          act: function () { settings.sound = !settings.sound; }
        },
        {
          label: 'CRT filter',
          hint: 'Toggle the 1997 CRT picture tube.',
          value: function () { return settings.scanlines ? 'On' : 'Off'; },
          act: function () { settings.scanlines = !settings.scanlines; }
        },
        {
          label: 'Birthday mode',
          hint: 'Debug: pretend it is June 22 and charge the limit gauge.',
          value: function () { return settings.birthday ? 'On' : 'Off'; },
          act: function () { settings.birthday = !settings.birthday; }
        },
        {
          label: 'Reroll limit',
          hint: 'Debug: reroll the random limit gauge.',
          value: function () { return limitPct + '%'; },
          act: function () { limitPct = 25 + Math.floor(Math.random() * 56); }
        },
        {
          label: 'Reset save data',
          hint: 'Debug: clear time, gil, and settings.',
          value: function () { return ''; },
          act: function () {
            try { localStorage.removeItem(KEY); } catch (e) {}
            location.reload();
          }
        },
        {
          label: 'Close',
          hint: 'Return to the menu.',
          value: function () { return ''; },
          act: function () { closeConfig(); }
        }
      ];

      function renderConfig() {
        configList.innerHTML = configItems.map(function (it) {
          return '<li><button class="citem" type="button" data-hint="' + it.hint + '">' +
            '<span class="hand">👉</span><span>' + it.label + '</span>' +
            '<span class="cval">' + it.value() + '</span></button></li>';
        }).join('');
        var lis = Array.prototype.slice.call(configList.children);
        configCursor = makeCursorList(lis, function (li) { li.querySelector('button').click(); });
        lis.forEach(function (li, i) {
          li.querySelector('button').addEventListener('click', function () {
            confirmBeep();
            configItems[i].act();
            if (overlay.classList.contains('open')) {
              applySettings();
              renderConfig();
            }
          });
        });
      }

      function openConfig() {
        confirmBeep();
        renderConfig();
        overlay.classList.add('open');
      }
      function closeConfig() {
        overlay.classList.remove('open');
        setHint(null);
      }
      overlay.addEventListener('click', function (e) { if (e.target === overlay) closeConfig(); });

      /* ---------- keyboard ---------- */
      document.addEventListener('keydown', function (e) {
        var open = overlay.classList.contains('open');
        var cursor = open ? configCursor : menuCursor;
        if (e.key === 'ArrowDown') { e.preventDefault(); cursor.move(1); }
        else if (e.key === 'ArrowUp') { e.preventDefault(); cursor.move(-1); }
        else if (e.key === 'Enter') { e.preventDefault(); cursor.activate(); }
        else if (e.key === 'Escape' && open) { closeConfig(); }
      });

      /* ---------- TV power button (desktop shell) ---------- */
      var powerBtn = document.getElementById('powerBtn');
      var frameEl = document.querySelector('.frame');
      if (powerBtn) {
        powerBtn.addEventListener('click', function () {
          var off = document.body.classList.toggle('tv-off');
          if (!off) {
            frameEl.classList.add('tv-on-anim');
            setTimeout(function () { frameEl.classList.remove('tv-on-anim'); }, 300);
          }
          if (off) { powerOffSound(); } else { powerOnSound(); }
        });
      }

      /* ---------- time (persistent across visits) & gil ---------- */
      var timeEl = document.getElementById('time');
      var gilEl = document.getElementById('gil');
      var sessionStart = Date.now();
      var baseSeconds = save.seconds;

      function totalSeconds() {
        return baseSeconds + Math.floor((Date.now() - sessionStart) / 1000);
      }

      function pad(n) { return n < 10 ? '0' + n : '' + n; }

      function tick() {
        var s = totalSeconds();
        timeEl.textContent = Math.floor(s / 3600) + ':' + pad(Math.floor(s / 60) % 60) + ':' + pad(s % 60);
        if (s > 0 && s % 10 === 0) {
          save.gil += 7;
          gilEl.textContent = save.gil.toLocaleString();
        }
        if (s % 5 === 0) persist();
      }

      function persist() {
        save.seconds = totalSeconds();
        writeSave();
      }

      window.addEventListener('pagehide', persist);
      document.addEventListener('visibilitychange', function () {
        if (document.visibilityState === 'hidden') persist();
      });

      gilEl.textContent = save.gil.toLocaleString();
      applySettings();
      tick();
      setInterval(tick, 1000);
    })();
  </script>
</body>
</html>
